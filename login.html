<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSphere AI Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:white;
}

.container{
width:380px;
background:#0f172a;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(37,99,235,0.4);
text-align:center;
}

h1{
margin-bottom:10px;
font-size:38px;
color:#60a5fa;
}

p{
margin-bottom:30px;
color:#cbd5e1;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.footer{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>SafeSphere AI</h1>

<p>Cybersecurity Access Portal</p>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button onclick="goDashboard()">
Login Securely
</button>

<div class="footer">
Protected by AI Security System
</div>

</div>

<script>

function goDashboard(){

alert("Login Successful!");

window.location.href="dashboard.html";

}

</script>

</body>
</html>
