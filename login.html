<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeSphere Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(2,6,23,0.9),rgba(2,6,23,0.95)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
color:white;
}

.login-box{
width:400px;
background:#0f172a;
padding:45px;
border-radius:20px;
box-shadow:0 0 30px rgba(37,99,235,0.4);
}

.login-box h1{
text-align:center;
margin-bottom:10px;
font-size:40px;
color:#60a5fa;
}

.login-box p{
text-align:center;
margin-bottom:35px;
color:#cbd5e1;
}

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.02);
}

.bottom-text{
margin-top:20px;
text-align:center;
color:#94a3b8;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<h1>SafeSphere AI</h1>

<p>Secure Cybersecurity Access Portal</p>

<div class="input-box">
<input type="email" placeholder="Enter Email">
</div>

<div class="input-box">
<input type="password" placeholder="Enter Password">
</div>

<button onclick="loginUser()">
Secure Login
</button>

<div class="bottom-text">
Protected by AI-powered security systems
</div>

</div>

<script>

function loginUser(){

alert("Login Successful!");

window.location.href="dashboard.html";

}

</script>

</body>

</html>
